# Data Analysis Report Configuration
# Generated by AI based on data structure analysis

# Data source configuration
data_source:
  type: multi_sheet          # multi_sheet | multi_file
  path: ./data/source.xlsx   # Excel file path (for multi_sheet)
  sheets: []                 # Sheet names for multi_sheet (must be strings, e.g., ['2026', '2025'])
  # files: []                # File paths for multi_file type

# Column configuration
key_column: 点位名称          # Column to merge on (must exist in all periods)
value_columns:               # Columns to analyze (2-3 columns recommended)
  - name: 购买杯数
  - name: 销售金额

# Period configuration
periods:
  current: '2026'            # Current period label (used in column names)
  previous: '2025'           # Previous period label (used in column names)
  # For multi_file: map file names to period labels
  # current_file: '销售汇总表-2026.03'
  # previous_file: '销售汇总表-2026.02'
  # last_period: '2026.02'   # Last period for MoM comparison (optional)

# Analysis types
analysis:
  - yoy                      # Year-over-year comparison
  # - mom                    # Month-over-month comparison (optional)

# Output configuration
output:
  dir: ./output              # Output directory
  title: 销售数据汇总          # Report title (used for sheet name and file name)

# Group summary configuration (optional)
# group_by:
#   column: 督导人员           # Column to group by
#   sheet_name: 督导人员汇总    # Output sheet name (default: "{column}汇总")
#   metrics: auto             # auto = smart filter (columns with "总"), or explicit list
#   null_handling: ignore     # ignore = skip nulls, unassigned = group as "未分配"
